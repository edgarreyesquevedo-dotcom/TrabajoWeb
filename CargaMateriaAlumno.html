<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Materias</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CargaMateriaAlumno.css">
</head>
<body>

<div class="contenedor">

    <header class="header">
        <strong><h1>Carga de Materias</h1></strong>
    </header>

    <aside class="barralateral">
        <nav>
            <ul>
                <p>Inicio</p>
                <p>Asignacion de Materias</p>
                <p>Carga de Materias</p>
            </ul>
        </nav>
    </aside>

    <main class="contenido">
        <section class="frijolito">

            <div class="campo">
                <p>Nombre del Alumno</p>
                <input type="text" id="nombre" name="nombre">
            </div>

            <div class="campo">
                <p>Semestre</p>
                <input type="text" id="semestre" name="semestre">
            </div>

            <div class="campo">
                <p>Materia</p>
                <input type="text" id="materia" name="materia">
            </div>

            <input type="submit" value="Cargar Materia">

        </section>
    </main>

</div>

<footer class="footer">Universidad Autonoma de Chimalhuacan</footer>

</body>
</html>
