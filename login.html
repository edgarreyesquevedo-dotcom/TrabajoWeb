<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CONALEP</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
 
        <!-- Panel izquierdo: formulario -->
        <main class="panel-izquierdo">
            <div class="tarjeta">
 
                <label class="titulo">Inicio de Sesión</label>
                <p class="subtitulo">Sistema de Gestión Escolar</p>
 
                <input type="text" class="textbox" name="usuario" placeholder="Usuario *">
                <input type="password" class="contra" name="contrasena" placeholder="Contraseña *">
 
                <button class="boton" onclick="window.location.href='maestros.html'">Iniciar Sesión</button>
 
                <label><a id="link" href="">¿Olvidó su contraseña?</a></label>

                <label> <a id = "link "href="maestros.html"> Entrar sin cuenta </a></label>
 
            </div>
        </main>
 
        <!-- Panel derecho: slideshow -->
        <aside class="panel-derecho">
 
            <div class="slideshow">
                <!-- 
                    Reemplaza los src con las rutas de tus imágenes reales.
                    Puedes agregar o quitar slides según necesites.
                -->
                <div class="slide activo">
                    <img src="plantel.webp" alt="Campus escolar">
                </div>
                <div class="slide">
                    <img src="Estudiantes.jpg" alt="Estudiantes">
                </div>
                <div class="slide">
                    <img src="laboratorio.jpg" alt="Laboratorio">
                </div>
                <div class="slide">
                    <img src="aula.jpg" alt="Aula">
                </div>
            </div>
 
            <div class="overlay"></div>
 
            <div class="panel-texto">
                <h2>Bienvenido</h2>
                <p>Colegio Nacional de Educación Profesional Técnica</p>
            </div>
 
            <div class="dots" id="dots"></div>
 
        </aside>
 
    </div>
 
    <script>
        const slides = document.querySelectorAll('.slide');
        const dotsContainer = document.getElementById('dots');
        let actual = 0;
 
        // Crear dots dinámicamente
        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === 0) dot.classList.add('activo');
            dotsContainer.appendChild(dot);
        });
 
        const dots = document.querySelectorAll('.dot');
 
        function cambiarSlide(siguiente) {
            slides[actual].classList.remove('activo');
            dots[actual].classList.remove('activo');
 
            actual = (siguiente !== undefined) ? siguiente : (actual + 1) % slides.length;
 
            slides[actual].classList.add('activo');
            dots[actual].classList.add('activo');
        }
 
        // Cambio automático cada 4 segundos
        setInterval(() => cambiarSlide(), 4000);
    </script>
</body>
</html>
